name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository product boundary check
        run: node scripts/wellfit-dev-agent/src/repository-inventory-check.mjs

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
        env:
          NODE_OPTIONS: --max-old-space-size=768

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ github.run_id }}
          path: build.log
          if-no-files-found: warn
          retention-days: 3
