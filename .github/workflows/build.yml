name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository product boundary check
        run: node scripts/wellfit-dev-agent/src/repository-inventory-check.mjs

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=768
