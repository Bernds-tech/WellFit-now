name: Beta 1 Emulator Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  beta1-emulator-tests:
    name: Beta 1 emulator verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Set up Java for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install root dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Validate agent config
        run: npm run agent:validate

      - name: Run agent quality gate
        if: ${{ always() }}
        run: npm run agent:quality-gate

      - name: Run lint
        if: ${{ always() }}
        run: npm run lint

      - name: Check Functions syntax
        if: ${{ always() }}
        run: npm --prefix functions run check

      - name: Run Beta-1 emulator tests
        if: ${{ always() }}
        run: |
          npx firebase emulators:exec \
            --project demo-no-project \
            --only auth,firestore,functions \
            "npm --prefix functions run beta1:rules && npm --prefix functions run beta1:callable"
