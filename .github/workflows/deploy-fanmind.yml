name: Deploy FanMind

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to FanMind server
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.FANMIND_SSH_HOST }}
          SSH_PORT: ${{ secrets.FANMIND_SSH_PORT }}
          SSH_KEY: ${{ secrets.FANMIND_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/fanmind_deploy_key
          chmod 600 ~/.ssh/fanmind_deploy_key
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.FANMIND_SSH_HOST }}
          SSH_PORT: ${{ secrets.FANMIND_SSH_PORT }}
          SSH_USER: ${{ secrets.FANMIND_SSH_USER }}
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/fanmind_deploy_key \
            -p "${SSH_PORT:-22}" \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=30 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=30 \
            "$SSH_USER@$SSH_HOST" << 'EOF'
            set -euo pipefail
            echo "[deploy] $(date -u) entering /srv/www/fanmind"
            cd /srv/www/fanmind
            echo "[deploy] $(date -u) git pull"
            git pull --ff-only
            echo "[deploy] $(date -u) npm ci"
            npm ci --no-audit --no-fund
            echo "[deploy] $(date -u) build"
            npm run build
            echo "[deploy] $(date -u) restart service"
            systemctl restart fanmind
            echo "[deploy] $(date -u) service status"
            systemctl status fanmind --no-pager
          EOF
